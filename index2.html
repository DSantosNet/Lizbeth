<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola, Licenciada Liz</title>
    <link rel="icon" href="IMG/favicon.png" type="image/png">

</head>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background-image:url("IMG/fondo.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    width:90%;
    max-width:450px;
}

h1{
    color:#333;
    font-size:24px;
    margin-bottom:20px;
}

.heart{
    color:#ff4d6d;
}

.gif-container{
    margin-bottom:20px;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.gif-container img{
    max-width:100%;
    max-height:100%;
    border-radius:10px;
}

.btn-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    position:relative;
    height:50px;
}

button{
    padding:10px 25px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

#btn-si{
    background-color:#4cc9f0;
    color:white;
    transition:0.2s;
}

#btn-si:hover{
    transform:scale(1.05);
}

#btn-no{
    background-color:#ff4d6d;
    color:white;
    position:absolute;
    left:55%;
    top:0;
}

.message{
    margin-top:15px;
    font-size:20px;
    color:#666;
    font-style:italic;
    min-height:30px;
}
</style>
</head>

<body>

<div class="card">


    <div class="gif-container">
<img id="gif" src="IMG/picture.jpg" alt="Ositos tiernos">
    </div>

    <div class="btn-container" id="buttons-section">
    <h1 id="title">
        Estabas hermosa ese día, quiero seguir conociéndonos. 
        <span class="heart">❤</span>
    </h1>
    </div>

    <p class="message" id="sub-message"></p>

</div>



</body>
</html>
